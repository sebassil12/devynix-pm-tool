version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: devynix_db
      POSTGRES_USER: devynix_user
      POSTGRES_PASSWORD: devynix_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

